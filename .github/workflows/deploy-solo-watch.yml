name: Deploy GitHub Pages apps

on:
  push:
    branches: [main]
    paths:
      - "solo-watch/**"
      - "alarm-log/**"
      - "ea-corr-calc/**"
      - ".github/workflows/deploy-solo-watch.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-apps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build combined site
        run: |
          rm -rf _site
          mkdir -p _site/alarm-log _site/ea-corr-calc
          cp -r solo-watch/. _site/
          cp -r alarm-log/. _site/alarm-log/
          cp -r ea-corr-calc/. _site/ea-corr-calc/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
          commit_message: "Deploy Solo Watch + Alarm Log + Corr Risk"
