name: Deploy Solo Watch to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "solo-watch/**"
      - ".github/workflows/deploy-solo-watch.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: solo-watch-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Solo Watch artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: solo-watch

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
