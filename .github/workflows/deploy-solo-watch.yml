name: Deploy Solo Watch to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "solo-watch/**"
      - ".github/workflows/deploy-solo-watch.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: solo-watch-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy solo-watch to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./solo-watch
          force_orphan: true
          commit_message: "Deploy Solo Watch"
